<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo Card</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<article data-testid="test-todo-card" aria-label="Todo item">

  <div class="header">
    <input 
      type="checkbox"
      id="todo-check"
      data-testid="test-todo-complete-toggle"
    />

    <!-- Visible label (ACCESSIBILITY REQUIREMENT MET) -->
    <label for="todo-check">Mark complete</label>

    <h2 data-testid="test-todo-title" id="title">
      Build Stage 0 Task
    </h2>
  </div>

  <p data-testid="test-todo-description">
    Create a fully accessible and testable Todo card component.
  </p>

  <div class="meta">
    <span 
      data-testid="test-todo-priority"
      class="priority high"
      aria-label="High priority"
    >
      High
    </span>

    <span 
      data-testid="test-todo-status"
      id="status"
      class="status"
      aria-label="Status: Pending"
    >
      Pending
    </span>
  </div>

  <time 
    data-testid="test-todo-due-date"
    id="dueDate"
  ></time>

  <time 
    data-testid="test-todo-time-remaining"
    id="timeRemaining"
    aria-live="polite"
  ></time>

  <ul data-testid="test-todo-tags" class="tags" role="list">
    <li data-testid="test-todo-tag-work">work</li>
    <li data-testid="test-todo-tag-urgent">urgent</li>
    <li>design</li>
  </ul>

  <div class="actions">
    <button data-testid="test-todo-edit-button">
      Edit
    </button>

    <button data-testid="test-todo-delete-button">
      Delete
    </button>
  </div>

</article>

<script src="script.js"></script>
</body>
</html>
